<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mudhalvan AI Skill Gap Prototype</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f6fa;
    padding: 20px;
}
h1, h2 { text-align:center; color:#2c3e50;}
.container { max-width: 800px; margin:auto; background:#fff; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
.step { display:none; }
input, select, button { padding:10px; margin:5px 0; width:100%; border-radius:5px; border:1px solid #ccc;}
button { background:#3498db; color:#fff; border:none; cursor:pointer;}
button:hover { background:#2980b9;}
.list-item { background:#ecf0f1; margin:5px 0; padding:5px 10px; border-radius:5px;}
</style>
</head>
<body>
<div class="container">
<h1>Mudhalvan AI Skill Gap Prototype</h1>

<!-- Step 1: Student Info -->
<div class="step" id="step1" style="display:block;">
<h2>Step 1: Enter Your Name</h2>
<input type="text" id="studentName" placeholder="Enter your name">
<button onclick="nextStep(1)">Next</button>
</div>

<!-- Step 2: Skills Input -->
<div class="step" id="step2">
<h2>Step 2: Enter Your Skills (comma separated)</h2>
<input type="text" id="studentSkills" placeholder="e.g., CAD, MATLAB, EV Systems">
<button onclick="nextStep(2)">Next</button>
</div>

<!-- Step 3: Field Selection -->
<div class="step" id="step3">
<h2>Step 3: Choose Your Desired Field</h2>
<select id="studentField">
    <option value="">Select Field</option>
    <option value="automotive">Automotive Manufacturing</option>
    <option value="ev">EV Ecosystem</option>
</select>
<button onclick="nextStep(3)">Next</button>
</div>

<!-- Step 4: Skill Gap & Cognitive Profile -->
<div class="step" id="step4">
<h2>Step 4: Skill Gap Analysis & Cognitive Profile</h2>
<div id="skillGap"></div>
<div id="cognitiveProfile"></div>
<div id="recommendedSkills"></div>
<div id="learningPath"></div>
<div id="recommendedCompanies"></div>
</div>

</div>

<script>
// Mock industry-required skills
const industrySkills = {
    automotive: ['CAD', 'SolidWorks', 'Material Science', 'Manufacturing Process', 'Quality Control', 'PLC', 'Lean Manufacturing', '3D Printing', 'Automation', 'Thermal Analysis'],
    ev: ['Battery Management', 'Power Electronics', 'Motor Design', 'Control Systems', 'EV Charging', 'Battery Safety', 'Simulation', 'Embedded Systems', 'Energy Storage', 'IoT for EV']
};

// Mock Learning Paths & YouTube links
const learningLinks = {
    'CAD': 'https://www.youtube.com/watch?v=CAD_tutorial',
    'SolidWorks': 'https://www.youtube.com/watch?v=SolidWorks_tutorial',
    'Battery Management': 'https://www.youtube.com/watch?v=Battery_tutorial',
    'Control Systems': 'https://www.youtube.com/watch?v=ControlSystems_tutorial',
    'Manufacturing Process': 'https://www.youtube.com/watch?v=Manufacturing_tutorial'
};

// Mock companies
const companies = {
    automotive: ['Tata Motors', 'Mahindra', 'Maruti Suzuki'],
    ev: ['Ather Energy', 'Ola Electric', 'Tork Motors']
};

// Step navigation
function nextStep(current) {
    document.getElementById(step${current}).style.display = 'none';
    const next = current + 1;
    if(next <= 4) {
        document.getElementById(step${next}).style.display = 'block';
        if(next === 4) generateResults();
    }
}

// Generate Skill Gap, Cognitive Profile, Recommendations
function generateResults() {
    const name = document.getElementById('studentName').value.trim();
    const skills = document.getElementById('studentSkills').value.split(',').map(s => s.trim());
    const field = document.getElementById('studentField').value;

    const requiredSkills = industrySkills[field];
    const missingSkills = requiredSkills.filter(skill => !skills.includes(skill));

    // Skill Gap Display
    let skillHtml = <h3>Hello ${name}</h3>;
    skillHtml += <p><strong>Your entered skills:</strong> ${skills.join(', ')}</p>;
    skillHtml += <p><strong>Missing Skills for ${field === 'automotive' ? 'Automotive' : 'EV'}:</strong></p><ul>;
    missingSkills.forEach(skill => skillHtml += <li class="list-item">${skill}</li>);
    skillHtml += </ul>;
    document.getElementById('skillGap').innerHTML = skillHtml;

    // Cognitive Profile (mock scoring)
    const score = Math.floor((skills.length / requiredSkills.length) * 100);
    let profile = '';
    if(score >= 70) profile = 'High cognitive readiness';
    else if(score >= 50) profile = 'Moderate cognitive readiness';
    else profile = 'Needs improvement';
    document.getElementById('cognitiveProfile').innerHTML = <h3>Cognitive Profile:</h3><p>Score: ${score}% - ${profile}</p>;

    // Recommended Skills + Learning Links
    let recSkillsHtml = <h3>Recommended Skills & Learning Links:</h3><ul>;
    missingSkills.forEach(skill => {
        const link = learningLinks[skill] ? <a href="${learningLinks[skill]}" target="_blank">Tutorial</a> : '';
        recSkillsHtml += <li class="list-item">${skill} ${link}</li>;
    });
    recSkillsHtml += '</ul>';
    document.getElementById('recommendedSkills').innerHTML = recSkillsHtml;

    // Recommended Companies
    let compHtml = <h3>Recommended Companies:</h3><ul>;
    companies[field].forEach(c => compHtml += <li class="list-item">${c}</li>);
    compHtml += '</ul>';
    document.getElementById('recommendedCompanies').innerHTML = compHtml;
}
</script>
</body>
</html>
